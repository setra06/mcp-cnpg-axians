# RBAC for the CloudNativePG MCP server when deployed inside a Kubernetes cluster
# via kagent. The ServiceAccount lives in the `kagent` namespace alongside the
# MCPServer CR; the ClusterRole is cluster-scoped because the server lists/manages
# CNPG resources across all namespaces.
#
# Two profiles are defined:
#   - cnpg-mcp-manager : full read/write on CNPG CRDs + read on core/v1 (default).
#   - cnpg-mcp-reader  : read-only — apply this instead of the manager role and
#                        set READ_ONLY=true on the MCPServer to enforce it at the
#                        application layer as well.
#
# Apply the manager role by default. Swap the ClusterRoleBinding's `roleRef.name`
# to `cnpg-mcp-reader` for a read-only deployment.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cnpg-mcp-server
  namespace: kagent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cnpg-mcp-manager
rules:
  - apiGroups: ["postgresql.cnpg.io"]
    resources:
      - clusters
      - backups
      - scheduledbackups
      - poolers
      - databases
      - publications
      - subscriptions
      - imagecatalogs
      - clusterimagecatalogs
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "secrets", "events", "namespaces", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cnpg-mcp-reader
rules:
  - apiGroups: ["postgresql.cnpg.io"]
    resources:
      - clusters
      - backups
      - scheduledbackups
      - poolers
      - databases
      - publications
      - subscriptions
      - imagecatalogs
      - clusterimagecatalogs
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "secrets", "events", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cnpg-mcp-server-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  # Swap to `cnpg-mcp-reader` for a read-only deployment.
  name: cnpg-mcp-manager
subjects:
  - kind: ServiceAccount
    name: cnpg-mcp-server
    namespace: kagent
---
# Static SA token Secret. Since Kubernetes 1.24 the SA no longer auto-mints a
# Secret; we declare one explicitly so install.sh can read the JWT and inject
# it into the MCPServer CR (kagent does not yet support `secretKeyRef` on
# spec.deployment.env — see README "Securing the deployment").
apiVersion: v1
kind: Secret
metadata:
  name: cnpg-mcp-server-token
  namespace: kagent
  annotations:
    kubernetes.io/service-account.name: cnpg-mcp-server
type: kubernetes.io/service-account-token
